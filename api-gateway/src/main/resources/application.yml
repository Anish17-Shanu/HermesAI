server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: decision-service
          uri: http://decision-service:8081
          predicates:
            - Path=/api/v1/decisions/**
        - id: human-review-service
          uri: http://human-review-service:8082
          predicates:
            - Path=/api/v1/reviews/**
        - id: workflow-service
          uri: http://workflow-orchestrator-service:8083
          predicates:
            - Path=/api/v1/workflows/**
        - id: feedback-service
          uri: http://feedback-learning-service:8084
          predicates:
            - Path=/api/v1/feedback/**
        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/v1/notifications/**
        - id: audit-service
          uri: http://audit-logging-service:8086
          predicates:
            - Path=/api/v1/audit/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
