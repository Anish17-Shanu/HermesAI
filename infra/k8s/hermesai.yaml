  name: api-gateway
  namespace: hermesai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: hermesai/api-gateway:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hermesai
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
