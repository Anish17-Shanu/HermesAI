apiVersion: v1
kind: Namespace
metadata:
  name: hermesai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermesai-config
  namespace: hermesai
data:
  DB_URL: jdbc:postgresql://postgres:5432/hermesai
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP: kafka:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-service
  namespace: hermesai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-service
  template:
    metadata:
      labels:
        app: decision-service
    spec:
      containers:
        - name: decision-service
          image: hermesai/decision-service:latest
          envFrom:
            - configMapRef:
                name: hermesai-config
          ports:
            - containerPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: human-review-service
  namespace: hermesai
spec:
  replicas: 2
  selector:
    matchLabels:
